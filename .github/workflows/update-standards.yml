name: Update official NEA COPEH standards

on:
  schedule:
    # 09:17 Singapore time daily
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nea-standards-update
  cancel-in-progress: false

jobs:
  extract-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned extractor dependency
        run: python -m pip install -r requirements.txt

      - name: Discover, download, extract and validate latest official COPEH
        run: python scripts/update_standards.py

      - name: Run manifest tests
        run: python -m unittest discover -s tests -v

      - name: Commit only validated changes
        shell: bash
        run: |
          if git diff --quiet -- standards.json data/latest-copeh.pdf; then
            echo "Official PDF checksum and extracted standards are unchanged."
            exit 0
          fi
          git config user.name "vivata-standards-bot"
          git config user.email "vivata-standards-bot@users.noreply.github.com"
          git add standards.json data/latest-copeh.pdf
          git commit -m "chore: update extracted NEA COPEH standards"
          git push
